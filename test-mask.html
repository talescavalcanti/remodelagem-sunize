<!DOCTYPE html>
<html>
<head>
<style>
  .btn {
    position: relative;
    width: 200px;
    height: 50px;
    background: orange;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    color: white;
    font-weight: bold;
  }
  .border-container {
    position: absolute;
    inset: 0;
    border-radius: 9999px;
    padding: 2px; /* Border width */
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    overflow: hidden;
    pointer-events: none;
  }
  .spinner {
    position: absolute;
    inset: -100%;
    background: conic-gradient(from 0deg, transparent 70%, rgba(0,0,0,1) 100%);
    animation: spin 2s linear infinite;
  }
  @keyframes spin {
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body style="background: #333; padding: 50px;">
  <div class="btn">
    <div class="border-container">
      <div class="spinner"></div>
    </div>
    Hover me
  </div>
</body>
</html>
